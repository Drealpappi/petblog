{% extends "base.html" %}

{% block title %}{{ post.title }} - Pet Blog{% endblock %}

{% block content %}
    <article class="post-detail">
        <h1>{{ post.title }}</h1>
        <p class="post-meta">
            By {{ post.author.username }} · {{ post.created_at|date:"F j, Y" }}
        </p>
        
        {% if post.image %}
            <img src="{{ post.image.url }}" alt="{{ post.title }}" class="post-detail-image">
        {% endif %}
        
        <div class="post-content">
            {{ post.content|linebreaks }}
        </div>
        
        <a href="{% url 'home' %}" class="btn">← Back to Home</a>
    </article>
{% endblock %}
